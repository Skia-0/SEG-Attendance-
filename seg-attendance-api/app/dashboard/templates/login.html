{% extends "base.html" %}

{% block title %}Login - SEG Attendance Dashboard{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-white p-8 rounded-lg shadow-md border border-gray-100">
        <h2 class="text-2xl font-bold text-center text-gray-900 mb-6">Coordinator Login</h2>
        
        <form action="{{ url_for('dashboard.login') }}" method="POST" class="space-y-5">
            <div>
                <label for="phone" class="block text-sm font-semibold text-gray-700 mb-1">Phone Number</label>
                <input type="text" id="phone" name="phone" required placeholder="e.g. 0200000001"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
            </div>
            
            <button type="submit" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-4 rounded-md transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500">
                Log In
            </button>
        </form>
    </div>
</div>
{% endblock %}
